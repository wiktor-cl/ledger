name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # mvn verify runs unit tests (surefire) then Testcontainers-backed integration
      # tests (failsafe) against a real Postgres instance Testcontainers starts using
      # the Docker daemon that's preinstalled on ubuntu-latest runners.
      - name: Build and test
        run: mvn -B verify

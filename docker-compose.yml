services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ledger-postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ledger
      DB_USER: ledger
      DB_PASSWORD: ledger
      JWT_SECRET: local-dev-secret-not-for-production-use-at-least-32-bytes-long
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  ledger-postgres-data:
